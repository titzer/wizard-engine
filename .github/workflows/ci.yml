name: Continuous Integration

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - master

concurrency:
  # Cancels pending runs when a PR gets updated.
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  v3i:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        run: bash ./ci/build-test.sh v3i
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3i
          path: bin/*.v3i
  v3i-boxed-continuation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        env:
          WIZENG_BUILD_SH_ARGS: "--boxed-continuation"
        run: bash ./ci/build-test.sh v3i
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3i-boxed-continuation
          path: bin/*.v3i
  x86-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        run: bash ./ci/build-test.sh x86-linux
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86-linux
          path: bin/*.x86-linux
  x86-linux-boxed-continuation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        env:
          WIZENG_BUILD_SH_ARGS: "--boxed-continuation"
        run: bash ./ci/build-test.sh x86-linux
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86-linux-boxed-continuation
          path: bin/*.x86-linux
  x86-linux-o2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        run: bash ./ci/build-test.sh x86-linux -O2
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86-linux-o2
          path: bin/*.x86-linux
  x86-linux-o3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        run: bash ./ci/build-test.sh x86-linux -O3
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86-linux-o3
          path: bin/*.x86-linux
  x86_64-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        run: bash ./ci/build-test.sh x86-64-linux
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86-64-linux
          path: bin/*.x86-64-linux
  x86_64-linux-boxed-continuation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        env:
          WIZENG_BUILD_SH_ARGS: "--boxed-continuation"
        run: bash ./ci/build-test.sh x86-64-linux
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86-64-linux-boxed-continuation
          path: bin/*.x86-64-linux
  x86_64-linux-spc-inlining:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        env:
          WIZENG_RUNTIME_ARGS: "--inline-max-depth=1"
        run: bash ./ci/build-test.sh x86-64-linux
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86-64-linux-spc-inlining
          path: bin/*.x86-64-linux
  x86_64-linux-o2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        run: bash ./ci/build-test.sh x86-64-linux -O2
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86-64-linux-o2
          path: bin/*.x86-64-linux
  x86_64-linux-o3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        run: bash ./ci/build-test.sh x86-64-linux -O3
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86-64-linux-o3
          path: bin/*.x86-64-linux
  jvm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and Test
        run: bash ./ci/build-test.sh jvm
      - name: Upload Built Binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm
          path: |
            bin/*.jvm
            bin/*.jvm.jar
  spec-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build and run x86-linux
        run: bash ./ci/build-test-spec.sh x86-linux spec
      - name: Run x86-64-linux
        run: bash ./ci/build-test-spec.sh x86-64-linux spec
